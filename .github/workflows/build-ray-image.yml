name: Build Ray image

# Builds and pushes the Ray image when Ray-fanout related files
# change on main or iss_ext, or on demand via workflow_dispatch (e.g. before
# make cloud-train).
#
# iss_ext is included so the ISS extension can rebuild the image (which now
# carries run_iss_preprocessing + the ISS CLI dispatch) before merge to main.
# The WIF binding for refs/heads/iss_ext is provisioned in infra/github_oidc.tf
# (deployer_wif_iss_ext), matching build-collector-image.yml. Both branches push
# ray:latest; main is frozen during the extension, so the clobber risk is nil
# until iss_ext merges back (Phase 18), after which main resumes ownership.

on:
  push:
    branches:
      - main
      - iss_ext
    # Only rebuild when something baked INTO the image AND used by Ray
    # changes. The deploy/ray/cluster_*.yaml manifests are applied at runtime by
    # cloud_*.sh (envsubst | kubectl apply), not copied into the image, so they
    # must NOT trigger a rebuild. configs/ IS copied in (Dockerfile), so it must.
    # The src/.../api/** subtree is copied in too but only the Cloud Run API runs
    # it — the ray entrypoints (ray train/score/tune) never import it — so an
    # api-only change yields a functionally identical ray image. Excluded via
    # a negation: a commit that also touches a shared module (core/, model/, …)
    # still matches src/** and rebuilds; an api-only commit does not.
    paths:
      - "deploy/ray/Dockerfile"
      - "src/**"
      - "!src/spacecraft_telemetry/api/**"
      - "configs/**"
      - "pyproject.toml"
      - ".github/workflows/build-ray-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to apply (e.g. a release name). Leave blank for sha + latest only."
        required: false
        default: ""

permissions:
  id-token: write
  contents: read

env:
  REGION: us-central1
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  build-ray:
    name: Build and push Ray image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Ray image
        run: |
          AR_REPO="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/spacecraft-telemetry"
          IMAGE="${AR_REPO}/ray:${{ github.sha }}"
          docker build -f deploy/ray/Dockerfile -t "${IMAGE}" -t "${AR_REPO}/ray:latest" .
          docker push "${IMAGE}"
          docker push "${AR_REPO}/ray:latest"
          if [ -n "${{ inputs.tag }}" ]; then
            docker tag "${IMAGE}" "${AR_REPO}/ray:${{ inputs.tag }}"
            docker push "${AR_REPO}/ray:${{ inputs.tag }}"
          fi
          echo "Pushed: ${IMAGE}"
