env: test

# Paths are overridden per-test via tmp_path fixture.
data:
  raw_data_dir: data/raw
  sample_data_dir: data/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
  sample_fraction: 0.001
  sample_channels: 2

logging:
  level: WARNING
  format: console

spark:
  processed_data_dir: data/processed  # overridden to tmp_path in Spark tests
  driver_memory: "512m"
  num_cores: 1
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [3, 5]  # small for fast tests

feast:
  repo_path: feature_repo
  project: spacecraft_telemetry
  feature_view_name: telemetry_features
  source_path: data/processed/ESA-Mission1/features  # overridden to tmp_path in Feast tests
  source_root: data/processed
  ttl_days: 365

model:
  hidden_dim: 16
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 8
  epochs: 2
  window_size: 10
  prediction_horizon: 1
  early_stopping_patience: 5
  val_fraction: 0.1
  seed: 42
  device: cpu
  artifacts_dir: models
  error_smoothing_window: 5
  threshold_window: 20
  threshold_z: 3.0
  threshold_min_anomaly_len: 2

ray:
  num_cpus: 5
  num_gpus_per_task: 0.0
  max_retries: 1
