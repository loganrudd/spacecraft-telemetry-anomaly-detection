env: cloud

# GCS paths are set via env vars in deployment (Phase 10):
#   SPACECRAFT_DATA__RAW_DATA_DIR=gs://{project}-raw-data
#   SPACECRAFT_DATA__SAMPLE_DATA_DIR=gs://{project}-processed/sample
#   SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR=gs://{project}-processed
#   SPACECRAFT_DRIFT__REFERENCE_PROFILES_DIR=gs://{project}-artifacts/reference_profiles
#   SPACECRAFT_MONITORING__REFERENCE_PROFILES_DIR=gs://{project}-artifacts/reference_profiles
#   SPACECRAFT_MLFLOW__TRACKING_URI=https://{mlflow-cloud-run}.run.app
#   MLFLOW_ARTIFACTS_DESTINATION=gs://{project}-artifacts/mlflow
data:
  raw_data_dir: data/raw
  sample_data_dir: data/processed/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
    - ESA-Mission2
    - ESA-Mission3
  sample_fraction: 1.0
  sample_channels: 176

logging:
  level: INFO
  format: json

preprocess:
  processed_data_dir: data/processed  # overridden by SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR=gs://... in deployment
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [10, 50, 100]

model:
  hidden_dim: 80
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 64
  epochs: 35
  window_size: 250
  prediction_horizon: 1
  early_stopping_patience: 5
  val_fraction: 0.1
  seed: 42
  device: auto
  artifacts_dir: models
  error_smoothing_window: 30
  threshold_window: 250
  threshold_z: 3.0
  threshold_min_anomaly_len: 3
  num_workers: 0  # 4 channels packed per GPU pod (num_gpus_per_task=0.25) × 4 vCPUs — avoid DataLoader oversubscription
  inference_batch_size: 256

ray:
  num_gpus_per_task: 0.25
  max_retries: 3
  address: auto

tune:
  num_samples: 50
  max_concurrent_trials: 4
  parallel_subsystems: true
  max_parallel_subsystems: 4
  hpo_eval_fraction: 0.6

mlflow:
  # In cloud, point at the self-hosted MLflow Cloud Run service via env var:
  #   SPACECRAFT_MLFLOW__TRACKING_URI=https://{mlflow-cloud-run}.run.app
  # The auth hook in mlflow_tracking.runs.configure_mlflow (added in M3) injects
  # GCP ID tokens automatically when the host ends in .run.app.
  # Local fallback used when no env var is set:
  tracking_uri: "sqlite:///mlflow.db"
  experiment_prefix: ""

monitoring:
  drift_threshold: 0.30
  reference_profiles_dir: monitoring/reference_profiles
  report_output_dir: monitoring/reports
  reference_sample_rows: 5000

drift:
  enabled: true
  window_size: 256
  tick_interval: 60
  feature_drift_threshold: 0.05
  drift_alert_threshold: 0.30
  reference_profiles_dir: monitoring/reference_profiles

api:
  host: "0.0.0.0"
  port: 8080
  mission: "ESA-Mission2"
  # subsystem omitted → load every channel for the mission (Plan 009b semantics).
  channels: []
  replay_speed_default: 10.0
  replay_tick_interval_seconds: 1.0
  stream_buffer_max_events: 256
  request_timeout_seconds: 30
  # Path inside the Docker image where the built React dashboard lives.
  # create_app mounts this at / via StaticFiles(html=True).
  static_dir: /app/frontend/dist

