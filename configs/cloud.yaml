env: cloud

# GCS paths are set via env vars in deployment (Phase 11):
#   SPACECRAFT_DATA__RAW_DATA_DIR=gs://{project}-raw-data
#   SPACECRAFT_DATA__SAMPLE_DATA_DIR=gs://{project}-processed/sample
data:
  raw_data_dir: data/raw
  sample_data_dir: data/processed/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
    - ESA-Mission2
    - ESA-Mission3
  sample_fraction: 1.0
  sample_channels: 176

logging:
  level: INFO
  format: json

spark:
  processed_data_dir: data/processed  # overridden by SPACECRAFT_SPARK__PROCESSED_DATA_DIR=gs://... in deployment
  driver_memory: "4g"
  num_cores: 8
  window_size: 250
  prediction_horizon: 1
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [10, 50, 100]
