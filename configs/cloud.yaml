env: cloud

# GCS paths are set via env vars in deployment (Phase 11):
#   SPACECRAFT_DATA__RAW_DATA_DIR=gs://{project}-raw-data
#   SPACECRAFT_DATA__SAMPLE_DATA_DIR=gs://{project}-processed/sample
data:
  raw_data_dir: data/raw
  sample_data_dir: data/processed/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
    - ESA-Mission2
    - ESA-Mission3
  sample_fraction: 1.0
  sample_channels: 176

logging:
  level: INFO
  format: json

spark:
  processed_data_dir: data/processed  # overridden by SPACECRAFT_SPARK__PROCESSED_DATA_DIR=gs://... in deployment
  driver_memory: "4g"
  num_cores: 8
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [10, 50, 100]

model:
  hidden_dim: 80
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 64
  epochs: 35
  window_size: 250
  prediction_horizon: 1
  early_stopping_patience: 5
  val_fraction: 0.1
  seed: 42
  device: auto
  artifacts_dir: models
  error_smoothing_window: 30
  threshold_window: 250
  threshold_z: 3.0
  threshold_min_anomaly_len: 3
  num_workers: 4
  inference_batch_size: 256

ray:
  num_cpus: 8
  num_gpus_per_task: 0.25
  max_retries: 3
  address: auto

tune:
  num_samples: 100
  max_concurrent_trials: 8
  parallel_subsystems: true
  max_parallel_subsystems: 4
  hpo_eval_fraction: 0.6

mlflow:
  # tracking_uri and registry_uri are set via env vars in deployment (Phase 11):
  #   SPACECRAFT_MLFLOW__TRACKING_URI=postgresql+psycopg2://...
  #   SPACECRAFT_MLFLOW__REGISTRY_URI=postgresql+psycopg2://...
  tracking_uri: "sqlite:///mlflow.db"
  experiment_prefix: ""
