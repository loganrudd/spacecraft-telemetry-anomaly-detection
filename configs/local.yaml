env: local

data:
  raw_data_dir: data/raw
  sample_data_dir: data/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
    - ESA-Mission2
    - ESA-Mission3
  sample_fraction: 1.0
  sample_channels: 1 # Missions 1, 2, and 3 have 76, 100, and 48 channels total respectively

logging:
  level: DEBUG
  format: console

preprocess:
  processed_data_dir: data/processed
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [10, 50, 100]

model:
  hidden_dim: 80
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 512
  epochs: 10
  window_size: 250
  prediction_horizon: 1
  early_stopping_patience: 5
  val_fraction: 0.1
  seed: 42
  device: auto
  artifacts_dir: models
  error_smoothing_window: 30
  threshold_window: 250
  threshold_z: 3.0
  threshold_min_anomaly_len: 3
  prune_min_decrease: 0.13  # Hundman §3.3 false-positive pruning (0.0 disables)

ray:
  num_cpus: 4
  num_gpus_per_task: 0.0
  max_retries: 3

tune:
  num_samples: 20
  # SQLite supports only one writer at a time.  With max_concurrent_trials > 1,
  # parallel Ray Tune workers contend for the same mlflow.db write lock and can
  # produce "database is locked" errors or silent throughput collapse.
  # Keep this at 1 for local dev.  Cloud deployments should switch
  # tracking_uri to a PostgreSQL backend (configs/cloud.yaml) which handles
  # concurrent writers natively.
  max_concurrent_trials: 1
  parallel_subsystems: false
  max_parallel_subsystems: 2
  hpo_eval_fraction: 0.6

mlflow:
  # HTTP endpoint — all clients (Ray workers, model-train, etc.) write through
  # the server process, which serialises SQLite writes and eliminates "database
  # is locked" errors under concurrent Ray tasks.
  # Run `make mlflow-server` in a separate terminal before any training targets.
  tracking_uri: "http://127.0.0.1:5001" # if local mlflow server is running
  # SQLite file the server process opens.  Clients never touch this directly.
  backend_store_uri: "sqlite:///mlflow.db"
  experiment_prefix: ""

monitoring:
  drift_threshold: 0.30
  reference_profiles_dir: monitoring/reference_profiles
  report_output_dir: monitoring/reports
  reference_sample_rows: 5000

drift:
  enabled: true
  window_size: 256
  tick_interval: 60  # Tier 2: p95=61.9ms from Step 0 benchmark
  feature_drift_threshold: 0.05
  drift_alert_threshold: 0.30
  reference_profiles_dir: monitoring/reference_profiles

api:
  host: "127.0.0.1"
  port: 8000
  mission: "ESA-Mission1"
  subsystem: null   # null = load all trained channels for the mission
  channels: []
  replay_speed_default: 10.0
  replay_tick_interval_seconds: 1.0
  stream_buffer_max_events: 256
  request_timeout_seconds: 30
  cors_allowed_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
