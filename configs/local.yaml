env: local

data:
  raw_data_dir: data/raw
  sample_data_dir: data/sample
  zenodo_record_id: "12528696"
  missions:
    - ESA-Mission1
    - ESA-Mission2
    - ESA-Mission3
  sample_fraction: .01
  sample_channels: 4 # Missions 1, 2, and 3 have 76, 100, and 48 channels total respectively

logging:
  level: DEBUG
  format: console

spark:
  processed_data_dir: data/processed
  driver_memory: "3072m"
  num_cores: 8
  train_fraction: 0.8
  normalization: z-score
  gap_multiplier: 3.0
  feature_windows: [10, 50, 100]

feast:
  repo_path: feature_repo
  project: spacecraft_telemetry
  feature_view_name: telemetry_features
  source_path: data/processed/ESA-Mission1/features
  source_root: data/processed
  ttl_days: 365

model:
  hidden_dim: 80
  num_layers: 2
  dropout: 0.3
  learning_rate: 0.001
  batch_size: 128
  epochs: 1
  window_size: 250
  prediction_horizon: 1
  early_stopping_patience: 5
  val_fraction: 0.1
  seed: 42
  device: auto
  artifacts_dir: models
  error_smoothing_window: 30
  threshold_window: 250
  threshold_z: 3.0
  threshold_min_anomaly_len: 3

ray:
  num_cpus: 4
  num_gpus_per_task: 0.0
  max_retries: 3

tune:
  num_samples: 20
  max_concurrent_trials: 2
