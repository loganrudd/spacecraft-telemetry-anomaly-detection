# RayJob — pandas + Ray Core preprocessing for all channels on GKE Autopilot.
#
# Environment variables required before applying (cloud_preprocess.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MISSION      Mission name (e.g. ESA-Mission2)
#
# Apply via:
#   envsubst < deploy/ray/cluster_preprocess.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Preprocessing is CPU-bound pandas + PyArrow — no GPU needed.
#   One Ray task per channel; each task reads ~50-250 MB and writes ~20-80 MB.
#   Head: 1 vCPU / 2 GiB — lightweight driver (channel fan-out + normalization params).
#   Workers: 4 vCPU / 6 GiB each — small channels (~950MB peak) pack 4 per node
#   (4×950MB=3.8GB + 0.3GB Ray daemons = 4.1GB, threshold 5.7GB = 6×0.95);
#   large channels (>150MB Parquet, ~3.5GB peak) use num_cpus=4 to monopolize the
#   node. max_calls=1 on tasks forces process exit so the OS reclaims all RSS
#   before the next task starts.
#   On-demand workers; max_retries=3 on tasks handles transient node failures.

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-preprocess
  namespace: ray
spec:
  entrypoint: >-
    spacecraft-telemetry --env cloud preprocess run
    --mission ${MISSION}
    ${CHANNELS_ARG}

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/ray:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                  value: gs://${PROJECT_ID}-sample-data
                - name: SPACECRAFT_COLLECT__RAW_TICKS_DIR
                  value: gs://${PROJECT_ID}-raw-data
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
              # KubeRay default probes use timeoutSeconds: 1, which is too tight
              # for Ray GCS startup (~20-40s). Override to prevent false kills.
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 45
        rayStartParams: {}
        template:
          spec:
            serviceAccountName: ray-sa
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/ray:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                    value: gs://${PROJECT_ID}-sample-data
                  - name: SPACECRAFT_COLLECT__RAW_TICKS_DIR
                    value: gs://${PROJECT_ID}-raw-data
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                resources:
                  requests:
                    cpu: "4"
                    memory: "6Gi"
                  limits:
                    cpu: "4"
                    memory: "6Gi"
