# RayJob — parallel channel training on GKE Autopilot (CPU-only variant).
#
# Use this instead of cluster_train.yaml when the dataset is small enough that
# GPU provisioning overhead exceeds training time (e.g. ISS with ~1 week of data
# and 6 channels). cloud_train.sh selects this file automatically when CPU=1.
#
# Environment variables required before applying (cloud_train.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (e.g. ISS)
#   WINDOW_SIZE_OVERRIDE  128 for ISS, 250 for ESA (set by cloud_train.sh)
#
# Sizing rationale:
#   Head: 1 vCPU / 4 GiB — driver only.
#   Worker: 8 vCPU / 16 GiB on-demand (no GPU nodeSelector → n2-standard family).
#   num_cpus=1 per task → 8 concurrent channels on one worker; all 6 ISS channels
#   run in a single wave with 2 CPUs spare. CPU nodes provision in ~1 min vs 3–5 min
#   for L4 GPU nodes — faster end-to-end for small datasets.

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-train
  namespace: ray
spec:
  entrypoint: >-
    spacecraft-telemetry --env cloud ray train
    --mission ${MISSION}
    ${CHANNELS_ARG}

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/ray:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
                - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                  value: "0"
                - name: SPACECRAFT_MODEL__WINDOW_SIZE
                  value: "${WINDOW_SIZE_OVERRIDE}"
                - name: MLFLOW_HTTP_REQUEST_TIMEOUT
                  value: "30"
              resources:
                requests:
                  cpu: "1"
                  memory: "4Gi"
                limits:
                  cpu: "1"
                  memory: "4Gi"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 1
        rayStartParams: {}
        template:
          spec:
            serviceAccountName: ray-sa
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/ray:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                  - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                    value: "0"
                  - name: SPACECRAFT_MODEL__WINDOW_SIZE
                    value: "${WINDOW_SIZE_OVERRIDE}"
                  - name: MLFLOW_HTTP_REQUEST_TIMEOUT
                    value: "30"
                resources:
                  requests:
                    cpu: "8"
                    memory: "16Gi"
                  limits:
                    cpu: "8"
                    memory: "16Gi"
