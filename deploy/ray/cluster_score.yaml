# RayJob — parallel anomaly scoring for all channels on GKE Autopilot.
#
# Environment variables required before applying (cloud_score.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (e.g. ESA-Mission2)
#
# Apply via:
#   envsubst < deploy/ray/cluster_score.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Scoring is LSTM inference + pure-numpy anomaly scoring — CPU is sufficient.
#   Workers: 2 vCPU / 4 GiB each, 2 tasks per node (num_cpus=1).
#   Auto-detects tuned_configs.json in GCS (uploaded by cloud-tune).
#   Run after cloud-train for baseline; run again after cloud-tune to confirm
#   HPO improved anomaly detection metrics.

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-score
  namespace: ray
spec:
  entrypoint: >-
    bash -c 'set -e;
    gsutil cp gs://${PROJECT_ID}-artifacts/${MISSION}/tuned_configs.json /tmp/tuned_configs.json 2>/dev/null || true;
    if [ -f /tmp/tuned_configs.json ]; then
    spacecraft-telemetry --env cloud ray score
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt
    --tuned-configs /tmp/tuned_configs.json;
    else
    spacecraft-telemetry --env cloud ray score
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt;
    fi'

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 15
        rayStartParams: {}
        template:
          metadata:
            labels:
              cloud.google.com/gke-spot: "true"
          spec:
            serviceAccountName: ray-sa
            tolerations:
              - key: cloud.google.com/gke-spot
                operator: Exists
                effect: NoSchedule
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                resources:
                  requests:
                    cpu: "2"
                    memory: "4Gi"
                  limits:
                    cpu: "2"
                    memory: "4Gi"
