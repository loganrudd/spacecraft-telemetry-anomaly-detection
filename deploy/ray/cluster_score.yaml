# RayJob — parallel anomaly scoring for all channels on GKE Autopilot.
#
# Environment variables required before applying (cloud_score.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (e.g. ESA-Mission2)
#   TUNED        Set to "1" to fetch and apply tuned_configs.json from GCS.
#                Omit (or set to "") for a clean Hundman-defaults baseline.
#   NUM_GPUS     GPU fraction per score task (cloud_score.sh defaults to 0.125).
#
# Apply via:
#   envsubst < deploy/ray/cluster_score.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Scoring runs predict() (an LSTM forward pass) on the L4, then pure-numpy
#   anomaly scoring. On CPU the forward pass is ~20 min/channel for large
#   channels; on the GPU it is ~1-2 min. Workers: g2-standard-8 (8 vCPU) + 1× L4
#   spot; NUM_GPUS controls packing. Default NUM_GPUS=0.125: 8-way pack — the
#   forward passes are light, so 8 sharing the GPU saturate it. maxReplicas: 1
#   (NVIDIA_L4_GPUS quota = 1) — don't run scoring while a training job holds the
#   L4; score after training. Run after cloud-train for the Hundman-defaults
#   baseline (TUNED unset); re-run with TUNED=1 after cloud-tune for the held-out
#   comparison. This worker group always provisions a GPU node — for a CPU-only
#   score run (no L4), use the pre-GPU revision of this manifest from git history.

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-score
  namespace: ray
spec:
  entrypoint: >-
    bash -c 'set -e;
    if [ "${TUNED}" = "1" ]; then
    python -c "import gcsfs; fs=gcsfs.GCSFileSystem(); src=\"gs://${PROJECT_ID}-artifacts/${MISSION}/tuned_configs.json\"; fs.exists(src) or (print(\"ERROR: tuned_configs.json not found at \" + src) or __import__(\"sys\").exit(1)); fs.get(src, \"/tmp/tuned_configs.json\")";
    spacecraft-telemetry --env cloud ray score
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt
    --tuned-configs /tmp/tuned_configs.json;
    else
    spacecraft-telemetry --env cloud ray score
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt;
    fi'

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                  value: gs://${PROJECT_ID}-sample-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
                # The driver runs score_all_channels and reads num_gpus_per_task
                # to set each task's GPU fraction, so the head needs the knob too.
                - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                  value: "${NUM_GPUS}"
                - name: MLFLOW_HTTP_REQUEST_TIMEOUT
                  value: "30"
                - name: TUNED
                  value: "${TUNED}"
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 1 # NVIDIA_L4_GPUS quota = 1
        rayStartParams: {}
        template:
          spec:
            serviceAccountName: ray-sa
            nodeSelector:
              cloud.google.com/gke-accelerator: nvidia-l4
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                    value: gs://${PROJECT_ID}-sample-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                  # predict() forward passes are light, so 8-way (0.125) saturates
                  # the L4 on 8 vCPU. resolve_device("auto") flips to CUDA once the
                  # task is allocated a GPU fraction.
                  - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                    value: "${NUM_GPUS}"
                  # GKE mounts nvidia driver libs to /usr/local/nvidia/lib64 but
                  # does not set LD_LIBRARY_PATH — PyTorch can't find libcuda.so without it.
                  - name: LD_LIBRARY_PATH
                    value: /usr/local/nvidia/lib64
                  - name: MLFLOW_HTTP_REQUEST_TIMEOUT
                    value: "30"
                resources:
                  requests:
                    cpu: "8"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "8"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
