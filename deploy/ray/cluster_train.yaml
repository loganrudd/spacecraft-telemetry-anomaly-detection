# RayJob — parallel channel training on GKE Autopilot.
#
# Environment variables required before applying (cloud_train.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (e.g. ESA-Mission2)
#
# Apply via:
#   envsubst < deploy/ray/cluster_train.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Head: 1 vCPU / 4 GiB — driver only, no model work.
#   Workers: g2-standard-8 (8 vCPU) + 1× L4 spot; num_gpus=0.125 packs 8 LSTMs per GPU.
#   8 tasks × 1 CPU + 0.125 GPU each = fully utilises both the 8 CPUs and the L4.
#   1 node × 8 concurrent = 8 channels/batch; 90 channels → ~12 batches × ~3 min = ~35 min.

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-train
  namespace: ray
spec:
  entrypoint: >-
    spacecraft-telemetry --env cloud ray train
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
                - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                  value: "0.125"
              resources:
                requests:
                  cpu: "1"
                  memory: "4Gi"
                limits:
                  cpu: "1"
                  memory: "4Gi"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 1 # NVIDIA_L4_GPUS quota = 1
        rayStartParams: {}
        template:
          metadata:
            labels:
              cloud.google.com/gke-spot: "true"
          spec:
            serviceAccountName: ray-sa
            nodeSelector:
              cloud.google.com/gke-accelerator: nvidia-l4
            tolerations:
              - key: nvidia.com/gpu
                operator: Exists
                effect: NoSchedule
              - key: cloud.google.com/gke-spot
                operator: Exists
                effect: NoSchedule
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                  # Pack 8 channel models per L4 (24 GB VRAM, each LSTM <50 MB).
                  - name: SPACECRAFT_RAY__NUM_GPUS_PER_TASK
                    value: "0.125"
                  # GKE mounts nvidia driver libs to /usr/local/nvidia/lib64 but
                  # does not set LD_LIBRARY_PATH — PyTorch can't find libcuda.so without it.
                  - name: LD_LIBRARY_PATH
                    value: /usr/local/nvidia/lib64
                resources:
                  requests:
                    cpu: "8"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "8"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
