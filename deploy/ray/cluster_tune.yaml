# RayJob — Ray Tune HPO for scoring parameters on GKE Autopilot.
#
# Environment variables required before applying (cloud_tune.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (default: ESA-Mission2)
#
# Apply via:
#   envsubst < deploy/ray/cluster_tune.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Tune trials are pure-numpy scoring (Plan 005) — no GPU needed.
#   n1-standard-4 CPU workers are ~5× cheaper than T4 nodes for this workload.
#   Head: 1 vCPU / 2 GiB — lightweight Tune driver + MLflow logging.
#   Workers: 2 vCPU / 4 GiB each, max 4 concurrent (one trial per CPU).

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-tune
  namespace: ray
spec:
  entrypoint: >-
    spacecraft-telemetry --env cloud ray tune
    --mission ${MISSION:-ESA-Mission2}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION:-ESA-Mission2}/channels.txt

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_SPARK__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "1"
                  memory: "2Gi"

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 4
        rayStartParams: {}
        template:
          metadata:
            labels:
              cloud.google.com/gke-spot: "true"
          spec:
            serviceAccountName: ray-sa
            tolerations:
              - key: cloud.google.com/gke-spot
                operator: Exists
                effect: NoSchedule
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_SPARK__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                resources:
                  requests:
                    cpu: "2"
                    memory: "4Gi"
                  limits:
                    cpu: "2"
                    memory: "4Gi"
