# RayJob — Ray Tune HPO for scoring parameters on GKE Autopilot.
#
# Environment variables required before applying (cloud_tune.sh sets these):
#   PROJECT_ID   GCP project ID
#   REGION       GCP region (e.g. us-central1)
#   MLFLOW_URL   Internal Cloud Run URL for the MLflow tracking server
#   MISSION      Mission name (e.g. ESA-Mission2)
#
# Apply via:
#   envsubst < deploy/ray/cluster_tune.yaml | kubectl apply -f -
#
# Sizing rationale:
#   Tune trials are pure-numpy scoring — no GPU needed.
#   Head: 2 vCPU / 8 GiB. The driver process holds errors.npy + labels for all
#   channels in each running subsystem sweep in its Python heap for the full
#   tuner.fit() duration. With max_parallel_subsystems=2, two subsystem datasets
#   live in the heap simultaneously; on a full mission this peaks at ~3.8 GiB
#   driver + ~0.7 GiB Ray daemons. 8 GiB gives ~3.5 GiB headroom. The extra
#   vCPU is required by GKE Autopilot's ≤6.5 GiB/vCPU floor, not for compute
#   (num-cpus=0 so Ray never schedules tasks on the head).
#   Workers: 4 vCPU / 4 GiB each, max 4 concurrent (one trial per CPU).

apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: spacecraft-tune
  namespace: ray
spec:
  entrypoint: >-
    bash -c 'spacecraft-telemetry --env cloud ray tune
    --mission ${MISSION}
    --channels-from gs://${PROJECT_ID}-processed-data/${MISSION}/channels.txt
    && python -c "import gcsfs;
    gcsfs.GCSFileSystem().put(\"models/${MISSION}/tuned_configs.json\",
    \"gs://${PROJECT_ID}-artifacts/${MISSION}/tuned_configs.json\")"'

  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600

  rayClusterSpec:
    rayVersion: "2.31.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        num-cpus: "0"
      template:
        spec:
          serviceAccountName: ray-sa
          containers:
            - name: ray-head
              image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
              env:
                - name: SPACECRAFT_ENV
                  value: cloud
                - name: SPACECRAFT_MLFLOW__TRACKING_URI
                  value: ${MLFLOW_URL}
                - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                  value: gs://${PROJECT_ID}-processed-data
                - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                  value: gs://${PROJECT_ID}-sample-data
                - name: MLFLOW_ARTIFACTS_DESTINATION
                  value: gs://${PROJECT_ID}-artifacts/mlflow
                - name: SPACECRAFT_RAY__ADDRESS
                  value: auto
              resources:
                requests:
                  cpu: "2"
                  memory: "8Gi"
                limits:
                  cpu: "2"
                  memory: "8Gi"
              livenessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 180
                periodSeconds: 30
                timeoutSeconds: 20
                failureThreshold: 5
              readinessProbe:
                exec:
                  command:
                    - bash
                    - -c
                    - >-
                      wget -T 5 -q -O- http://localhost:52365/api/local_raylet_healthz
                      | grep success &&
                      wget -T 5 -q -O- http://localhost:8265/api/gcs_healthz
                      | grep success
                initialDelaySeconds: 90
                periodSeconds: 10
                timeoutSeconds: 20
                failureThreshold: 10

    workerGroupSpecs:
      - groupName: cpu-workers
        replicas: 1
        minReplicas: 0
        maxReplicas: 4
        rayStartParams: {}
        template:
          spec:
            serviceAccountName: ray-sa
            containers:
              - name: ray-worker
                image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/spacecraft-telemetry/training:latest
                env:
                  - name: SPACECRAFT_ENV
                    value: cloud
                  - name: SPACECRAFT_MLFLOW__TRACKING_URI
                    value: ${MLFLOW_URL}
                  - name: SPACECRAFT_PREPROCESS__PROCESSED_DATA_DIR
                    value: gs://${PROJECT_ID}-processed-data
                  - name: SPACECRAFT_DATA__SAMPLE_DATA_DIR
                    value: gs://${PROJECT_ID}-sample-data
                  - name: MLFLOW_ARTIFACTS_DESTINATION
                    value: gs://${PROJECT_ID}-artifacts/mlflow
                  - name: SPACECRAFT_RAY__ADDRESS
                    value: auto
                resources:
                  requests:
                    cpu: "4"
                    memory: "4Gi"
                  limits:
                    cpu: "4"
                    memory: "4Gi"
